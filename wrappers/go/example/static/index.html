<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Cryptography Demo - Go Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f1f5f9;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #6366f1;
        }
        .input-field {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: #f1f5f9;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #6366f1;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .success-bg { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); }
        .error-bg { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                BBS Cryptography
            </h1>
            <p class="text-slate-400">Pairing-Crypto Go (Gin) Integration Demo</p>
        </header>

        <!-- Main Card -->
        <div class="glass p-6 md:p-8 shadow-2xl mb-8">
            <!-- Tabs -->
            <div class="flex space-x-4 mb-8 border-b border-white/10 pb-4 overflow-x-auto">
                <button onclick="showTab('keygen')" class="tab-btn px-4 py-2 rounded-lg hover:bg-white/5 transition active" id="btn-keygen">Key Generation</button>
                <button onclick="showTab('sign')" class="tab-btn px-4 py-2 rounded-lg hover:bg-white/5 transition" id="btn-sign">Signing</button>
                <button onclick="showTab('proof')" class="tab-btn px-4 py-2 rounded-lg hover:bg-white/5 transition" id="btn-proof">ZKP & Disclosure</button>
            </div>

            <!-- KeyGen Tab -->
            <div id="tab-keygen" class="tab-content active space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-semibold">Generate BBS Keys</h2>
                    <button onclick="generateKeys()" class="btn-primary px-6 py-2 rounded-xl font-medium">Generate New Pair</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Public Key (Hex)</label>
                        <textarea id="pubkey-display" readonly class="input-field h-24 font-mono text-sm" placeholder="Generated public key will appear here..."></textarea>
                    </div>
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Secret Key (Hex)</label>
                        <input id="seckey-display" readonly type="password" class="input-field font-mono text-sm" placeholder="Generated secret key will appear here...">
                    </div>
                </div>
            </div>

            <!-- Sign Tab -->
            <div id="tab-sign" class="tab-content space-y-6">
                <h2 class="text-xl font-semibold">Sign Messages</h2>
                <div class="space-y-4">
                    <div id="messages-container" class="space-y-2">
                        <label class="text-sm text-slate-400 mb-1 block">Messages</label>
                        <input type="text" class="input-field msg-input" value="Hello BBS!">
                        <input type="text" class="input-field msg-input" value="Selective disclosure is cool">
                    </div>
                    <button onclick="addMessageField()" class="text-sm text-blue-400 hover:text-blue-300">+ Add another message</button>
                    
                    <div class="pt-4 border-t border-white/5">
                        <button onclick="signMessages()" class="btn-primary w-full py-3 rounded-xl font-semibold">Generate Signature</button>
                    </div>
                    
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Signature (Hex)</label>
                        <textarea id="signature-display" readonly class="input-field h-20 font-mono text-xs" placeholder="Signature will appear here..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Proof Tab -->
            <div id="tab-proof" class="tab-content space-y-6">
                <h2 class="text-xl font-semibold">Derive Zero-Knowledge Proof</h2>
                <p class="text-sm text-slate-400 italic">Select which messages to reveal to the verifier.</p>
                
                <div id="disclosure-container" class="space-y-3">
                    <!-- Dynamic disclosure toggles -->
                </div>

                <div class="pt-4 flex space-x-4">
                    <button onclick="deriveProof()" class="btn-primary flex-1 py-3 rounded-xl font-semibold">Derive Proof</button>
                    <button onclick="verifyProof()" class="bg-white/10 hover:bg-white/20 flex-1 py-3 rounded-xl font-semibold transition">Verify Proof</button>
                </div>

                <div id="proof-result" class="p-4 rounded-xl border border-transparent hidden text-center font-medium"></div>
                
                <div>
                    <label class="text-sm text-slate-400 mb-1 block">Proof Data (Hex)</label>
                    <textarea id="proof-display" readonly class="input-field h-32 font-mono text-xs" placeholder="Derived proof will appear here..."></textarea>
                </div>
            </div>
        </div>

        <footer class="text-center text-slate-500 text-sm">
            Powered by Rust Core & Go Gin Bridge
        </footer>
    </div>

    <script>
        let currentState = {
            publicKey: '',
            secretKey: '',
            signature: '',
            messages: [],
            proof: ''
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('text-blue-400', 'border-blue-400', 'bg-white/5'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('bg-white/5');

            if (tabId === 'proof') updateDisclosureUI();
        }

        function addMessageField() {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'input-field msg-input mt-2';
            input.placeholder = 'Enter message...';
            document.getElementById('messages-container').appendChild(input);
        }

        async function generateKeys() {
            try {
                const res = await fetch('/keys');
                const data = await res.json();
                currentState.publicKey = data.publicKey;
                currentState.secretKey = data.secretKey;
                document.getElementById('pubkey-display').value = data.publicKey;
                document.getElementById('seckey-display').value = data.secretKey;
            } catch (e) { alert('Error generating keys: ' + e); }
        }

        async function signMessages() {
            if (!currentState.secretKey) return alert('Please generate keys first');
            
            const inputs = document.querySelectorAll('.msg-input');
            currentState.messages = Array.from(inputs).map(i => i.value).filter(v => v !== '');

            try {
                const res = await fetch('/sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        secretKey: currentState.secretKey,
                        publicKey: currentState.publicKey,
                        messages: currentState.messages
                    })
                });
                const data = await res.json();
                currentState.signature = data.signature;
                document.getElementById('signature-display').value = data.signature;
            } catch (e) { alert('Error signing: ' + e); }
        }

        function updateDisclosureUI() {
            const container = document.getElementById('disclosure-container');
            container.innerHTML = '';
            currentState.messages.forEach((msg, idx) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5';
                div.innerHTML = `
                    <span class="text-sm truncate mr-4">"${msg}"</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" data-index="${idx}" class="sr-only peer reveal-toggle" checked>
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        <span class="ml-3 text-xs text-slate-400">Reveal</span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

        async function deriveProof() {
            if (!currentState.signature) return alert('Please sign messages first');
            
            const toggles = document.querySelectorAll('.reveal-toggle');
            const proofMsgs = Array.from(toggles).map((t, i) => ({
                value: btoa(currentState.messages[i]), // Backend expects raw but for simplicity in JSON we used string array or hex? Wait, Go mock uses string.
                reveal: t.checked
            }));
            
            // Re-matching Go backend: messages are strings in SignRequest but ProofMessage in DeriveProofRequest
            const messagesForProof = currentState.messages.map((m, i) => ({
                value: m,
                reveal: toggles[i].checked
            }));

            try {
                const res = await fetch('/proof/derive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        publicKey: currentState.publicKey,
                        signature: currentState.signature,
                        messages: messagesForProof,
                        presentationHeader: ''
                    })
                });
                const data = await res.json();
                currentState.proof = data.proof;
                document.getElementById('proof-display').value = data.proof;
            } catch (e) { alert('Error deriving proof: ' + e); }
        }

        async function verifyProof() {
            if (!currentState.proof) return alert('Please derive proof first');
            
            const toggles = document.querySelectorAll('.reveal-toggle');
            const revealedMessages = {};
            toggles.forEach((t, i) => {
                if (t.checked) revealedMessages[i] = currentState.messages[i];
            });

            try {
                const res = await fetch('/proof/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        publicKey: currentState.publicKey,
                        proof: currentState.proof,
                        revealedMessages: revealedMessages
                    })
                });
                const data = await res.json();
                const resultDiv = document.getElementById('proof-result');
                resultDiv.classList.remove('hidden', 'success-bg', 'error-bg');
                
                if (data.valid) {
                    resultDiv.innerText = '✅ Proof Verified Successfully!';
                    resultDiv.classList.add('success-bg', 'text-green-400');
                } else {
                    resultDiv.innerText = '❌ Proof Verification Failed';
                    resultDiv.classList.add('error-bg', 'text-red-400');
                }
            } catch (e) { alert('Error verifying proof: ' + e); }
        }
    </script>
</body>
</html>
